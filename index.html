<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McNath Capital | Private Investment</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --blue: #4A90C4;
            --blue-dark: #2B6FA0;
            --blue-light: #6AADD9;
            --blue-border: rgba(74,144,196,0.22);
            --bg: #FAFBFC;
            --bg-2: #F0F4F8;
            --text: #1A2B3C;
            --muted: #6B8CAE;
            --white: #ffffff;
            --navy: #0D1B2A;
            --navy-mid: #112236;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 64px;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--blue-border);
            transition: box-shadow 0.3s;
        }

        nav.scrolled {
            box-shadow: 0 2px 24px rgba(74,144,196,0.1);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-img {
            height: 46px;
            width: auto;
            display: block;
        }

        .nav-brand-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--navy);
            letter-spacing: 0.08em;
            border-left: 1px solid var(--blue-border);
            padding-left: 14px;
            line-height: 1.2;
        }

        .nav-brand-label span {
            display: block;
            font-size: 0.52rem;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 400;
            margin-top: 2px;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--blue);
        }

        .nav-cta {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 10px 22px;
            border: 1.5px solid var(--blue);
            color: var(--blue);
            text-decoration: none;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .nav-cta:hover {
            background: var(--blue);
            color: #fff;
        }

        /* HERO */
        #hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: var(--navy);
        }

        .hero-bg-layer {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 60% 70% at 100% 50%, rgba(74,144,196,0.1) 0%, transparent 65%), radial-gradient(ellipse 40% 50% at 0% 80%, rgba(74,144,196,0.05) 0%, transparent 60%), linear-gradient(135deg, #0D1B2A 0%, #091522 100%);
        }

        .hero-grid-lines {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(74,144,196,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(74,144,196,0.06) 1px, transparent 1px);
            background-size: 72px 72px;
        }

        .hero-accent-v {
            position: absolute;
            left: 64px;
            top: 0;
            bottom: 0;
            width: 1px;
            background: linear-gradient(to bottom, transparent 10%, rgba(74,144,196,0.3) 40%, rgba(74,144,196,0.3) 60%, transparent 90%);
        }

        .hero-accent-h {
            position: absolute;
            right: 0;
            top: 50%;
            width: 45%;
            height: 1px;
            background: linear-gradient(to right, rgba(74,144,196,0.2), transparent);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            padding: 160px 64px 100px 120px;
            max-width: 760px;
        }

        .hero-eyebrow {
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.42em;
            text-transform: uppercase;
            color: var(--blue-light);
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            opacity: 0;
            animation: fadeUp 0.7s 0.2s forwards;
        }

        .hero-eyebrow::before {
            content: '';
            width: 28px;
            height: 1px;
            background: var(--blue-light);
            display: block;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 6vw, 5.4rem);
            font-weight: 300;
            line-height: 1.07;
            color: #fff;
            margin-bottom: 28px;
            opacity: 0;
            animation: fadeUp 0.7s 0.35s forwards;
        }

        h1 em {
            font-style: italic;
            color: var(--blue-light);
        }

        .hero-desc {
            font-size: 0.88rem;
            font-weight: 300;
            line-height: 1.95;
            color: rgba(255,255,255,0.5);
            max-width: 520px;
            margin-bottom: 44px;
            opacity: 0;
            animation: fadeUp 0.7s 0.5s forwards;
        }

        .hero-actions {
            display: flex;
            gap: 20px;
            align-items: center;
            opacity: 0;
            animation: fadeUp 0.7s 0.65s forwards;
        }

        .btn-primary {
            font-size: 0.67rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 14px 32px;
            background: var(--blue);
            color: #fff;
            text-decoration: none;
            transition: background 0.3s;
        }

        .btn-primary:hover {
            background: var(--blue-dark);
        }

        .btn-ghost {
            font-size: 0.67rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s;
        }

        .btn-ghost span {
            transition: transform 0.3s;
            display: inline-block;
        }

        .btn-ghost:hover {
            color: var(--blue-light);
        }

        .btn-ghost:hover span {
            transform: translateX(5px);
        }

        .hero-right {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 42%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 160px 64px 100px 40px;
            z-index: 2;
        }

        .hero-pillars {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .hero-pillar {
            padding: 20px 24px;
            background: rgba(255,255,255,0.03);
            border-left: 2px solid rgba(74,144,196,0.25);
            transition: border-color 0.3s, background 0.3s;
            opacity: 0;
        }

        .hero-pillar:nth-child(1) { animation: fadeIn 0.8s 0.8s forwards; }
        .hero-pillar:nth-child(2) { animation: fadeIn 0.8s 1s forwards; }
        .hero-pillar:nth-child(3) { animation: fadeIn 0.8s 1.2s forwards; }
        .hero-pillar:nth-child(4) { animation: fadeIn 0.8s 1.4s forwards; }

        .hero-pillar:hover {
            border-color: var(--blue);
            background: rgba(74,144,196,0.07);
        }

        .hp-label {
            font-size: 0.58rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--blue-light);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .hp-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: rgba(255,255,255,0.8);
        }

        /* SHARED */
        .section-wrap {
            padding: 92px 64px;
        }

        .section-wrap.light { background: #fff; }
        .section-wrap.alt { background: var(--bg-2); }
        .section-wrap.dark { background: var(--navy); }
        .section-wrap.navy-mid { background: var(--navy-mid); }

        .section-label {
            font-size: 0.58rem;
            font-weight: 600;
            letter-spacing: 0.38em;
            text-transform: uppercase;
            color: var(--blue);
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .section-label::before {
            content: '';
            display: block;
            width: 28px;
            height: 1.5px;
            background: var(--blue);
        }

        .dark .section-label, .navy-mid .section-label { color: var(--blue-light); }
        .dark .section-label::before, .navy-mid .section-label::before { background: var(--blue-light); }

        h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 3.5vw, 3.1rem);
            font-weight: 300;
            line-height: 1.12;
            color: var(--navy);
            margin-bottom: 18px;
        }

        h2 em {
            font-style: italic;
            color: var(--blue);
        }

        .dark h2, .navy-mid h2 { color: #fff; }
        .dark h2 em, .navy-mid h2 em { color: var(--blue-light); }

        .body-text {
            font-size: 0.85rem;
            font-weight: 300;
            line-height: 1.95;
            color: var(--muted);
        }

        .dark .body-text, .navy-mid .body-text { color: rgba(255,255,255,0.48); }

        .blue-rule {
            width: 40px;
            height: 2px;
            background: var(--blue);
            margin: 18px 0;
        }

        .dark .blue-rule { background: var(--blue-light); opacity: 0.5; }

        /* ABOUT / PHILOSOPHY */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 72px;
            align-items: start;
        }

        .three-col {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--blue-border);
            border: 1.5px solid var(--blue-border);
        }

        .value-card {
            background: #fff;
            padding: 36px 30px;
            transition: background 0.3s;
        }

        .value-card:hover { background: var(--bg-2); }

        .value-icon {
            font-size: 1.5rem;
            color: var(--blue);
            margin-bottom: 14px;
        }

        .value-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--navy);
            margin-bottom: 10px;
        }

        .value-text {
            font-size: 0.79rem;
            font-weight: 300;
            line-height: 1.85;
            color: var(--muted);
        }

        /* FOCUS */
        .focus-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            margin-top: 48px;
        }

        .focus-card {
            background: rgba(255,255,255,0.02);
            padding: 36px 32px;
            position: relative;
            overflow: hidden;
            transition: background 0.3s;
        }

        .focus-card:hover { background: rgba(74,144,196,0.09); }

        .focus-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--blue-light);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s;
        }

        .focus-card:hover::after { transform: scaleX(1); }

        .focus-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 300;
            color: rgba(255,255,255,0.04);
            line-height: 1;
            margin-bottom: 12px;
        }

        .focus-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 500;
            color: #fff;
            margin-bottom: 10px;
        }

        .focus-text {
            font-size: 0.79rem;
            font-weight: 300;
            line-height: 1.85;
            color: rgba(255,255,255,0.45);
        }

        .focus-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 16px;
        }

        .focus-tag {
            font-size: 0.58rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--blue-light);
            border: 1px solid rgba(106,173,217,0.25);
            padding: 3px 9px;
        }

        /* APPROACH */
        .approach-steps {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            margin-top: 48px;
            position: relative;
        }

        .approach-steps::before {
            content: '';
            position: absolute;
            top: 28px;
            left: 12%;
            right: 12%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(74,144,196,0.3), transparent);
        }

        .approach-step {
            padding: 0 20px;
            text-align: center;
        }

        .a-dot-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 22px;
        }

        .a-dot {
            width: 56px;
            height: 56px;
            border: 1.5px solid var(--blue-border);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            position: relative;
            z-index: 1;
        }

        .a-dot-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 300;
            color: var(--blue);
            line-height: 1;
        }

        .a-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .a-text {
            font-size: 0.75rem;
            font-weight: 300;
            line-height: 1.8;
            color: var(--muted);
        }

        /* TEAM */
        .team-founders {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 28px;
        }

        .founder-card {
            background: var(--navy);
            position: relative;
            overflow: hidden;
            padding: 48px 40px;
            border: 1px solid rgba(74,144,196,0.15);
        }

        .founder-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(to right, var(--blue), var(--blue-light));
        }

        .founder-card-bg {
            position: absolute;
            bottom: -40px;
            right: -40px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(74,144,196,0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        .founder-initial {
            width: 80px;
            height: 80px;
            border: 1.5px solid rgba(74,144,196,0.4);
            background: rgba(74,144,196,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            color: var(--blue-light);
            margin-bottom: 24px;
            border-radius: 50%;
        }

        .founder-badge {
            display: inline-block;
            font-size: 0.52rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            background: var(--blue);
            color: #fff;
            padding: 3px 9px;
            margin-bottom: 12px;
        }

        .founder-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 400;
            color: #fff;
            margin-bottom: 3px;
        }

        .founder-title {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--blue-light);
            margin-bottom: 20px;
        }

        .founder-bio {
            font-size: 0.8rem;
            font-weight: 300;
            line-height: 1.9;
            color: rgba(255,255,255,0.5);
        }

        .founder-bio + .founder-bio { margin-top: 12px; }

        /* CRITERIA */
        .criteria-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 48px;
        }

        .criteria-card {
            border: 1.5px solid var(--blue-border);
            background: #fff;
            padding: 28px 24px 28px 28px;
            position: relative;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .criteria-card:hover {
            border-color: rgba(74,144,196,0.45);
            box-shadow: 0 4px 20px rgba(74,144,196,0.07);
        }

        .criteria-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--blue);
        }

        .criteria-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--navy);
            margin-bottom: 6px;
        }

        .criteria-text {
            font-size: 0.79rem;
            font-weight: 300;
            line-height: 1.82;
            color: var(--muted);
        }

        /* CONTACT */
        .contact-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 72px;
            align-items: start;
        }

        .contact-body {
            font-size: 0.86rem;
            font-weight: 300;
            line-height: 1.95;
            color: var(--muted);
            margin-bottom: 28px;
        }

        .contact-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }

        .contact-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .contact-icon {
            width: 34px;
            height: 34px;
            border: 1px solid var(--blue-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.82rem;
            color: var(--blue);
            background: rgba(74,144,196,0.05);
            flex-shrink: 0;
        }

        .contact-txt {
            font-size: 0.81rem;
            color: var(--muted);
        }

        .contact-txt strong {
            display: block;
            font-size: 0.57rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--blue);
            font-weight: 500;
            margin-bottom: 1px;
        }

        .sister-note {
            margin-top: 28px;
            padding: 18px 20px 18px 24px;
            background: rgba(74,144,196,0.06);
            border: 1px solid rgba(74,144,196,0.22);
            border-left: 3px solid var(--blue);
            font-size: 0.78rem;
            font-weight: 300;
            line-height: 1.8;
            color: var(--muted);
        }

        .sister-note strong {
            color: var(--navy);
            font-weight: 500;
            display: block;
            margin-bottom: 3px;
            font-size: 0.82rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .fgrp {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .fgrp label {
            font-size: 0.57rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--blue);
            font-weight: 500;
        }

        .fgrp input, .fgrp select, .fgrp textarea {
            background: #fff;
            border: 1.5px solid var(--blue-border);
            padding: 11px 13px;
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.82rem;
            font-weight: 300;
            outline: none;
            transition: border-color 0.3s;
            resize: vertical;
        }

        .fgrp input::placeholder, .fgrp textarea::placeholder {
            color: rgba(107,140,174,0.4);
        }

        .fgrp input:focus, .fgrp select:focus, .fgrp textarea:focus {
            border-color: var(--blue);
        }

        .fgrp select option {
            background: #fff;
            color: var(--text);
        }

        .btn-submit {
            font-size: 0.67rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 14px 32px;
            background: var(--blue);
            color: #fff;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            transition: background 0.3s;
            width: 100%;
            margin-top: 4px;
        }

        .btn-submit:hover { background: var(--blue-dark); }

        /* FOOTER */
        footer {
            background: #080F18;
            border-top: 1px solid rgba(74,144,196,0.15);
            padding: 32px 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .footer-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .footer-logo {
            height: 32px;
            width: auto;
            filter: brightness(0) invert(1);
            opacity: 0.6;
        }

        .footer-brand-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem;
            font-weight: 400;
            color: rgba(255,255,255,0.4);
            border-left: 1px solid rgba(255,255,255,0.12);
            padding-left: 12px;
            letter-spacing: 0.06em;
        }

        .footer-copy {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.25);
        }

        .footer-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .footer-links a {
            font-size: 0.6rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover { color: var(--blue-light); }

        @keyframes fadeUp {
