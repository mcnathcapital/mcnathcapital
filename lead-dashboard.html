<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McNath Capital Leads - Knox Management Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .leads-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .leads-table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
        }
        .leads-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }
        .leads-table tr:hover {
            background: #f8f9fa;
        }
        .priority-high {
            background: #ff6b6b !important;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .priority-medium {
            background: #ffa726;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .priority-low {
            background: #66bb6a;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .status-new {
            background: #4fc3f7;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        .add-lead-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .region-tag {
            background: #e3f2fd;
            color: #1976d2;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>🏢 McNath Capital Group - Lead Tracker</h1>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">
            Knox-Managed Lead Capture System | National Business Capital Specialists
        </p>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalLeads">0</div>
                <div class="stat-label">Total Leads</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="highPriority">0</div>
                <div class="stat-label">High Priority</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="weeklyLeads">0</div>
                <div class="stat-label">This Week</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="revenue">$0</div>
                <div class="stat-label">Pipeline Value</div>
            </div>
        </div>

        <button class="add-lead-btn" onclick="simulateLead()">🔄 Simulate New Lead (Demo)</button>

        <table class="leads-table">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Company</th>
                    <th>Email</th>
                    <th>Calculator</th>
                    <th>Value</th>
                    <th>Region</th>
                    <th>Priority</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="leadsTableBody">
                <!-- Demo data will be populated here -->
            </tbody>
        </table>
    </div>

    <script>
        // Demo lead data
        let leads = [
            {
                timestamp: '2026-02-22 00:30',
                company: 'TechCorp Solutions',
                email: 'ceo@techcorp.com',
                calculator: 'Business Valuation',
                value: '$24M',
                region: 'Los Angeles',
                priority: 'High',
                status: 'New'
            },
            {
                timestamp: '2026-02-22 00:28',
                company: 'Smith Manufacturing',
                email: 'owner@smithmfg.com',
                calculator: 'SBA Calculator',
                value: '$750K',
                region: 'Chicago',
                priority: 'High',
                status: 'New'
            },
            {
                timestamp: '2026-02-22 00:25',
                company: 'Miami Retail Group',
                email: 'finance@miamiretail.com',
                calculator: 'Profit Margin',
                value: '$5M Rev',
                region: 'Miami',
                priority: 'Medium',
                status: 'New'
            }
        ];

        function updateStats() {
            document.getElementById('totalLeads').textContent = leads.length;
            document.getElementById('highPriority').textContent = leads.filter(l => l.priority === 'High').length;
            document.getElementById('weeklyLeads').textContent = leads.length; // All are this week in demo
            
            // Calculate pipeline value (demo calculation)
            let pipelineValue = leads.reduce((total, lead) => {
                if (lead.calculator === 'SBA Calculator') return total + 15000; // $15K avg referral
                if (lead.calculator === 'Business Valuation') return total + 25000; // $25K avg referral
                if (lead.calculator === 'Profit Margin') return total + 5000; // $5K optimization
                return total + 8000; // Other calculators
            }, 0);
            
            document.getElementById('revenue').textContent = '$' + (pipelineValue/1000).toFixed(0) + 'K';
        }

        function renderLeads() {
            const tbody = document.getElementById('leadsTableBody');
            tbody.innerHTML = leads.map(lead => `
                <tr>
                    <td>${lead.timestamp}</td>
                    <td><strong>${lead.company}</strong></td>
                    <td>${lead.email}</td>
                    <td>${lead.calculator}</td>
                    <td><strong>${lead.value}</strong></td>
                    <td><span class="region-tag">${lead.region}</span></td>
                    <td><span class="priority-${lead.priority.toLowerCase()}">${lead.priority}</span></td>
                    <td><span class="status-${lead.status.toLowerCase()}">${lead.status}</span></td>
                </tr>
            `).join('');
        }

        function simulateLead() {
            const demoLeads = [
                {
                    company: 'Phoenix Construction Inc',
                    email: 'cfo@phoenixconstruction.com',
                    calculator: 'SBA Calculator',
                    value: '$1.2M',
                    region: 'New York',
                    priority: 'High'
                },
                {
                    company: 'Bay Area Tech Startup',
                    email: 'founder@baytech.com',
                    calculator: 'Business Valuation',
                    value: '$18M',
                    region: 'Los Angeles',
                    priority: 'High'
                },
                {
                    company: 'Midwest Healthcare Group',
                    email: 'admin@midwesthc.com',
                    calculator: 'Profit Margin',
                    value: '$8M Rev',
                    region: 'Chicago',
                    priority: 'Medium'
                }
            ];

            const newLead = demoLeads[Math.floor(Math.random() * demoLeads.length)];
            newLead.timestamp = new Date().toLocaleString('en-US', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            }).replace(',', '');
            newLead.status = 'New';

            leads.unshift(newLead); // Add to beginning
            renderLeads();
            updateStats();

            // Highlight new row
            const firstRow = document.querySelector('#leadsTableBody tr');
            firstRow.style.background = '#e8f5e8';
            setTimeout(() => {
                firstRow.style.background = '';
            }, 2000);
        }

        // Initialize dashboard
        renderLeads();
        updateStats();

        // Auto-refresh simulation (demo)
        setInterval(() => {
            if (Math.random() < 0.1) { // 10% chance every 10 seconds
                simulateLead();
            }
        }, 10000);
    </script>
</body>
</html>
